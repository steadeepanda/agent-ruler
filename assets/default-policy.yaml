version: "1"
profile: "strict"
zones:
  workspace_paths:
    - "${WORKSPACE}"
  user_data_paths:
    - "~/.config"
    - "~/.local/share"
    - "~/Documents"
  shared_paths:
    - "/usr/local"
    - "/opt"
    - "/var"
    - "${WORKSPACE}/../shared-zone"
  system_critical_paths:
    - "/etc"
    - "/bin"
    - "/sbin"
    - "/usr/bin"
    - "/usr/sbin"
    - "/lib"
    - "/lib64"
    - "/boot"
    - "/proc"
    - "/sys"
    - "/dev"
    - "/root"
  secrets_paths:
    - "~/.ssh"
    - "~/.gnupg"
    - "~/.aws"
    - "~/.kube"
    - "~/.netrc"
    - "~/.config/gh"
    - "${WORKSPACE}/.env"
    - "${WORKSPACE}/**/*.pem"
    - "${WORKSPACE}/**/*.key"
rules:
  filesystem:
    workspace: "allow"
    user_data: "allow"
    shared: "approval"
    system_critical: "deny"
    secrets: "deny"
  network:
    default_deny: true
    allowlist_hosts:
      - "github.com"
      - "api.github.com"
      - "raw.githubusercontent.com"
      - "gist.githubusercontent.com"
      - "docs.github.com"
      - "pypi.org"
      - "files.pythonhosted.org"
      - "registry.npmjs.org"
      - "docs.npmjs.com"
      - "crates.io"
      - "static.crates.io"
      - "docs.rs"
      - "packages.ubuntu.com"
      - "manpages.ubuntu.com"
      - "archive.ubuntu.com"
      - "security.ubuntu.com"
      - "developer.mozilla.org"
      - "nodejs.org"
      - "docs.python.org"
      - "doc.rust-lang.org"
      - "pkg.go.dev"
      - "go.dev"
      - "gitlab.com"
      - "docs.gitlab.com"
      - "platform.openai.com"
      - "api.openai.com"
      - "api.telegram.org"
      - "upload.pypi.org"
      - "discord.com"
      - "api.facebook.com"
      - "graph.facebook.com"
      - "whatsapp.com"
      - "api.whatsapp.com"
    require_approval_for_post: true
    denylist_hosts: []
    invert_allowlist: false
    invert_denylist: false
  execution:
    deny_workspace_exec: true
    deny_tmp_exec: true
    quarantine_on_download_exec_chain: true
    allowed_exec_prefixes:
      - "/usr/bin"
      - "/bin"
      - "/usr/local/bin"
  persistence:
    deny_autostart: false
    approval_paths:
      - "/etc/systemd/system/**"
      - "/etc/systemd/user/**"
      - "/etc/cron.d/**"
      - "/etc/cron.*/**"
      - "/etc/crontab"
      - "/var/spool/cron/**"
    deny_paths:
      - "/etc/ld.so.preload"
      - "/etc/sudoers"
  elevation:
    enabled: true
    require_operator_auth: true
    use_allowlist: true
    allowed_packages:
      - "git"
      - "curl"
      - "wget"
      - "ca-certificates"
      - "unzip"
      - "zip"
      - "tar"
      - "gzip"
      - "xz-utils"
      - "jq"
      - "make"
      - "build-essential"
      - "pkg-config"
      - "python3"
      - "python3-pip"
      - "python3-venv"
      - "nodejs"
      - "npm"
      - "ripgrep"
      - "fd-find"
      - "sqlite3"
      - "requests"
      - "httpx"
      - "pydantic"
      - "pyyaml"
      - "rich"
      - "typer"
      - "click"
      - "pytest"
      - "numpy"
      - "pandas"
      - "typescript"
      - "tsx"
      - "eslint"
      - "prettier"
      - "vite"
      - "vitest"
      - "express"
      - "axios"
      - "zod"
      - "dotenv"
      - "serde"
      - "serde_json"
      - "tokio"
      - "reqwest"
      - "clap"
      - "anyhow"
      - "thiserror"
      - "tracing"
      - "axum"
      - "sqlx"
    denied_packages:
      - "openssh-server"
      - "xrdp"
      - "tcpdump"
      - "wireshark"
      - "tshark"
      - "bettercap"
      - "nmap"
      - "netcat-openbsd"
      - "socat"
      - "hydra"
      - "sqlmap"
      - "john"
      - "hashcat"
      - "aircrack-ng"
      - "mitmproxy"
      - "scapy"
      - "impacket"
      - "node-pty"
safeguards:
  mass_delete_threshold: 40
approvals:
  ttl_seconds: 1800
